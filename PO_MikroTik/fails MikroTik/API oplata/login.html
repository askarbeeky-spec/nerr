<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>SKY Internet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
        }

        .loader {
            text-align: center;
            color: white;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        h2 {
            margin: 0 0 10px;
            font-size: 22px;
        }

        p {
            margin: 0;
            opacity: 0.8;
            font-size: 14px;
        }
    </style>
    <script>
        // MikroTik передает MAC и IP через переменные $(mac) и $(ip)
        window.onload = function () {
            var mac = '$(mac)';
            var ip = '$(ip)';
            var nasIp = '$(link-orig-host)';
            var router = 'router_demo_001';

            // Строим URL портала оплаты — /portal/ со слешем чтобы избежать 307 редиректа
            var portalUrl = 'http://192.168.88.254:5000/portal/'
                + '?mac=' + encodeURIComponent(mac)
                + '&ip=' + encodeURIComponent(ip)
                + '&router=' + encodeURIComponent(router);

            // Редирект через 1 секунду
            setTimeout(function () {
                window.location.href = portalUrl;
            }, 800);
        };
    </script>
</head>

<body>
    <div class="loader">
        <div class="spinner"></div>
        <h2>SKY Internet 🌐</h2>
        <p>Перенаправление на страницу оплаты...</p>
    </div>
</body>

</html>
