# Custom queries for the 'users' table structure
# Expected columns: username, password, mac, enabled, rate_limit

authorize_check_query = "\
  SELECT id, username, 'Cleartext-Password' AS attribute, password AS value, ':=' AS op \
  FROM users \
  WHERE enabled = true \
    AND (username = '%{User-Name}' OR mac = '%{Calling-Station-Id}') \
  LIMIT 1"

authorize_reply_query = "\
  SELECT id, username, 'Mikrotik-Rate-Limit' AS attribute, rate_limit AS value, '=' AS op \
  FROM users \
  WHERE enabled = true \
    AND (username = '%{User-Name}' OR mac = '%{Calling-Station-Id}') \
    AND rate_limit IS NOT NULL AND rate_limit <> ''"

