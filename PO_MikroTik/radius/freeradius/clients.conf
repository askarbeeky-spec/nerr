# ============================================================
# FreeRADIUS clients.conf — боевой конфиг
# Сюда входят все возможные IP с которых MikroTik может слать RADIUS запросы
# ============================================================

# Локальный тест (внутри контейнера)
client localhost {
    ipaddr = 127.0.0.1
    secret = radius123
    shortname = localhost
}

# MikroTik — оба возможных IP (88-сеть и 50-сеть hotspot)
client mikrotik_88 {
    ipaddr = 192.168.88.1
    secret = radius123
    shortname = mikrotik_88
    nastype = mikrotik
}

client mikrotik_50 {
    ipaddr = 192.168.50.1
    secret = radius123
    shortname = mikrotik_50
    nastype = mikrotik
}

# Вся подсеть 88.x (на случай если IP изменится)
client mikrotik_net_88 {
    ipaddr = 192.168.88.0/24
    secret = radius123
    shortname = mikrotik_net_88
    nastype = mikrotik
}

# Вся подсеть 50.x (hotspot сеть)
client mikrotik_net_50 {
    ipaddr = 192.168.50.0/24
    secret = radius123
    shortname = mikrotik_net_50
    nastype = mikrotik
}

# Docker Desktop bridge networks
client docker_bridge {
    ipaddr = 172.17.0.0/16
    secret = radius123
    shortname = docker_bridge
    nastype = other
}

client docker_compose_net {
    ipaddr = 172.18.0.0/16
    secret = radius123
    shortname = docker_compose
    nastype = other
}

# Весь Docker internal range
client docker_all {
    ipaddr = 172.16.0.0/12
    secret = radius123
    shortname = docker_all
    nastype = other
}

# Windows хост / WSL2
client windows_host {
    ipaddr = 10.0.0.0/8
    secret = radius123
    shortname = windows_host
    nastype = other
}
